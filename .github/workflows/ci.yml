# FORCH.i ORACLE — CI Pipeline
# Runs on every push and PR to master/main
# Jobs: lint → type-check → test → build

name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test:run
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'dummy-for-tests' }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY || 'dummy-for-tests' }}
          CRON_SECRET: 'test-secret'

      - name: Build
        run: npm run build
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'dummy-for-build' }}
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY || 'dummy-for-build' }}
          CRON_SECRET: 'build-secret'
