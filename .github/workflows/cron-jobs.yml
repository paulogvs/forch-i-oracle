# FORCH.i ORACLE — Cron Jobs via GitHub Actions
# Reemplaza los Vercel Cron Jobs (plan Hobby limitado a 1/día)
# La app sigue en Vercel; GitHub solo dispara HTTP requests a las APIs.
#
# Data Source Priority (en ingest):
#   1. wheniskickoff.com — Free, no API key (PRIMARY)
#   2. openfootball/worldcup.json — Free GitHub CDN (FALLBACK)
#   3. API-Football (v3) — requires paid plan for 2026 season (secondary fallback)
#   4. football-data.org (v4) — free tier includes World Cup (tertiary fallback)
#
# Configuración requerida en GitHub Secrets:
#   VERCEL_URL   — https://forch-i-oracle.vercel.app (o tu dominio personalizado)
#   CRON_SECRET  — Mismo valor que en Vercel Environment Variables
#                  Se envía como Authorization: Bearer header (NO como query param)
#
# Schedules (UTC) — aligned to match ends:
#   Ingest:      15:30, 18:30, 21:30, 00:30 UTC (post-match, after 150 min)
#   Recalculate: cada 6 horas → 0 */6 * * *
#   Simulate:    diario 00:00 → 0 0 * * *

name: Cron Jobs - FORCH.i ORACLE

on:
  schedule:
    - cron: '30 15 * * *'   # Ingest: match 1 (13:00 UTC) ends ~15:30
    - cron: '30 18 * * *'   # Ingest: match 2 (16:00 UTC) ends ~18:30
    - cron: '30 21 * * *'   # Ingest: match 3 (19:00 UTC) ends ~21:30
    - cron: '30 0 * * *'    # Ingest: match 4 (22:00 UTC) ends ~00:30
    - cron: '0 */6 * * *'   # Recalculate: cada 6h
    - cron: '0 0 * * *'     # Simulate: diario a medianoche UTC
  workflow_dispatch:         # Permite ejecución manual desde UI de GitHub

concurrency:
  group: cron-jobs
  cancel-in-progress: false

env:
  VERCEL_URL: ${{ secrets.VERCEL_URL || 'https://forch-i-oracle.vercel.app' }}
  CRON_SECRET: ${{ secrets.CRON_SECRET }}

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # JOB 1: DATA INGESTION — post-match (4x/day during WC)
  # ═══════════════════════════════════════════════════════════════════
  cron-ingest:
    if: >
      github.event.schedule == '30 15 * * *' ||
      github.event.schedule == '30 18 * * *' ||
      github.event.schedule == '30 21 * * *' ||
      github.event.schedule == '30 0 * * *' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🔄 Llamar /api/cron/ingest
        id: ingest
        run: |
          echo "Iniciando ingesta de datos..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${VERCEL_URL}/api/cron/ingest")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          echo "status=$HTTP_CODE" >> $GITHUB_OUTPUT
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Ingest failed with status $HTTP_CODE"
            exit 1
          fi
      - name: 📊 Mostrar resultado
        if: always()
        run: |
          echo "✅ Ingest completado (status: ${{ steps.ingest.outputs.status }})"

  # ═══════════════════════════════════════════════════════════════════
  # JOB 2: RECALCULATE PREDICTIONS — cada 6 horas
  # ═══════════════════════════════════════════════════════════════════
  cron-recalculate:
    if: github.event.schedule == '0 */6 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 🔄 Llamar /api/cron/recalculate
        id: recalc
        run: |
          echo "Recalculando predicciones..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${VERCEL_URL}/api/cron/recalculate")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          echo "status=$HTTP_CODE" >> $GITHUB_OUTPUT
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Recalculate failed with status $HTTP_CODE"
            exit 1
          fi
      - name: 📊 Mostrar resultado
        if: always()
        run: |
          echo "✅ Recalculate completado (status: ${{ steps.recalc.outputs.status }})"

  # ═══════════════════════════════════════════════════════════════════
  # JOB 3: TOURNAMENT SIMULATION — diario a medianoche
  # ═══════════════════════════════════════════════════════════════════
  cron-simulate:
    if: github.event.schedule == '0 0 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 🔄 Llamar /api/cron/simulate
        id: simulate
        run: |
          echo "Ejecutando simulación de torneo..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X GET \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${VERCEL_URL}/api/cron/simulate")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          echo "status=$HTTP_CODE" >> $GITHUB_OUTPUT
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Simulate failed with status $HTTP_CODE"
            exit 1
          fi
      - name: 🏆 Mostrar resultado
        if: always()
        run: |
          echo "✅ Simulación completada (status: ${{ steps.simulate.outputs.status }})"
