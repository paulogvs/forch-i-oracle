<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="50%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0A0A0A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="200" cy="200" r="150" fill="#D4AF37" opacity="0.05"/>
  <circle cx="1000" cy="400" r="200" fill="#1B5E20" opacity="0.08"/>
  <!-- Title -->
  <text x="600" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="72" fill="#FFFFFF">FORCH.i</text>
  <text x="600" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="96" fill="url(#gold)">ORACLE</text>
  <!-- Subtitle -->
  <text x="600" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" fill="#9CA3AF">AI-Powered Sports Predictions</text>
  <text x="600" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#6B7280">FIFA World Cup 2026 · Gemini 1.5 Flash</text>
  <!-- Badge -->
  <rect x="450" y="500" width="300" height="40" rx="20" fill="#D4AF37" opacity="0.15"/>
  <text x="600" y="527" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#D4AF37">Built with FORCH.i by Paulo Velasco</text>
</svg>
